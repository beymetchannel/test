<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteor Dragoon PWA Test</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-color: #f4f4f9;
            --text-color: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        /* モーダル基本スタイル */
        .pwa-modal {
            display: none; /* 初期は非表示 */
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1000;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .pwa-modal h3 { margin: 0 0 12px 0; color: var(--primary-color); font-size: 1.2rem; }
        .pwa-modal p { font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px; }
        
        /* ボタンデザイン */
        .btn-action {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .btn-close {
            margin-top: 12px;
            background: none;
            border: none;
            color: #888;
            text-decoration: underline;
            font-size: 0.8rem;
        }

        /* アイコン強調 */
        .icon-guide {
            font-size: 1.4rem;
            vertical-align: middle;
            margin: 0 4px;
        }

        /* デバッグ用ステータス */
        #status-board {
            font-size: 0.8rem;
            color: #666;
            margin-top: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>Meteor Dragoon</h1>
    <p>スタジアム最速のデータ体験を！</p>

    <div id="status-board">判定中...</div>

    <div id="modal-webview" class="pwa-modal">
        <h3>🚀 ブラウザで開き直してください</h3>
        <p>Xのアプリ内ブラウザでは、最新のコンボ（Combo）機能が制限される場合があります！<br>
        右下の <strong>ブラウザアイコン</strong> をタップして、SafariやChromeで開き直してください！</p>
        <button class="btn-action" onclick="closeAll()">了解しました！</button>
    </div>

    <div id="modal-ios" class="pwa-modal">
        <h3>📱 ホーム画面に追加</h3>
        <p>Meteor Dragoonをフル画面で！<br>
        下の <span class="icon-guide">⎋</span> (共有ボタン) をタップし、<strong>「ホーム画面に追加」</strong>を選択してください！</p>
        <button class="btn-action" onclick="closeAll()">やり方を確認した！</button>
        <button class="btn-close" onclick="closeAll()">今は閉じる</button>
    </div>

    <div id="modal-android" class="pwa-modal">
        <h3>⚡ アプリをインストール</h3>
        <p>スタジアムの不安定な電波でも高速起動！<br>
        下のボタンからホーム画面に追加して、快適にアクセスしましょう！</p>
        <button id="btn-install" class="btn-action">アプリをインストール</button>
        <button class="btn-close" onclick="closeAll()">今は閉じる</button>
    </div>

    <script>
        const ua = window.navigator.userAgent.toLowerCase();
        const statusBoard = document.getElementById('status-board');
        let deferredPrompt;

        function closeAll() {
            document.querySelectorAll('.pwa-modal').forEach(m => m.style.display = 'none');
        }

        window.addEventListener('DOMContentLoaded', () => {
            // PWA判定ロジック
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            const isTwitter = ua.indexOf('twitter') > -1 || ua.indexOf('fban') > -1 || ua.indexOf('fbav') > -1;
            const isIos = /iphone|ipad|ipod/.test(ua);
            const isAndroid = /android/.test(ua);

            statusBoard.innerHTML = `Standalone: ${isStandalone} / In-App: ${isTwitter} / OS: ${isIos ? 'iOS' : 'Android'}`;

            // 1. すでにPWAなら何も出さない
            if (isStandalone) {
                statusBoard.innerHTML += "<br>✅ PWAとして起動中！案内は不要です！";
                return;
            }

            // 2. X内ブラウザ(WebView)の場合
            if (isTwitter) {
                document.getElementById('modal-webview').style.display = 'block';
                return;
            }

            // 3. 通常ブラウザの場合（OS別）
            if (isIos) {
                document.getElementById('modal-ios').style.display = 'block';
            } else if (isAndroid) {
                // Androidの場合はインストールプロンプトを待機
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    document.getElementById('modal-android').style.display = 'block';
                });
            }
        });

        // Androidインストールボタンの動作
        document.getElementById('btn-install')?.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response: ${outcome}`);
                deferredPrompt = null;
                closeAll();
            }
        });
    </script>
</body>
</html>
